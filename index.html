<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Digital Bouquet Note</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #fdf6f0;
      font-family: "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      display: flex;
      align-items: center;
      gap: 40px;
    }

    .bouquet {
      width: 700px; /* bigger image */
      animation: sway 4s ease-in-out infinite;
      cursor: pointer;
    }

    @keyframes sway {
      0%   { transform: rotate(0deg) translateY(0px); }
      25%  { transform: rotate(1deg) translateY(-2px); }
      50%  { transform: rotate(0deg) translateY(0px); }
      75%  { transform: rotate(-1deg) translateY(-2px); }
      100% { transform: rotate(0deg) translateY(0px); }
    }

    .note {
      max-width: 300px;
      background: #fff8f0;
      border: 2px solid #f2c1a0;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      font-size: 1.1em;
      color: #444;
      opacity: 0;
      transform: translateX(30px);
      transition: opacity 1.5s ease, transform 1.5s ease;
    }

    .note.show {
      opacity: 1;
      transform: translateX(0);
    }

    .side-note {
      margin-top: 15px;
      font-size: 0.9em;
      color: #888;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="img.png" alt="Digital Bouquet" class="bouquet" id="bouquet">
    <div class="note" id="note">
      Hey! Science is so fake, They say sun is the hottest thing in the universe but actually its ""YOU"".
      <div class="side-note">Hasssann</div>
    </div>
  </div>

  <script>
    window.onload = () => {
      const note = document.getElementById('note');
      // Show note automatically on load
      setTimeout(() => {
        note.classList.add('show');
      }, 1000);
    };
  </script>
</body>

</html>
